services:
  spotiflac-api:
    build: .
    container_name: spotiflac-api
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ${DOWNLOAD_DIR:-./downloads}:/downloads
    environment:
      - PORT=8080
      - OUTPUT_DIR=/downloads
      - API_KEY=${API_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
